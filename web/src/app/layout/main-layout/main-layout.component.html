<div class="flex flex-col h-screen overflow-hidden bg-syn-page-background-color">
  <!-- Top Header -->
  <app-header #header class="z-50 shrink-0" label="LiDAR Studio" />

  <div class="flex flex-1 overflow-hidden relative min-h-0">
    <!-- Sidebar -->
    <app-side-nav
      #sideNav
      (onHide)="handleSideNavHide()"
      (onShow)="handleSideNavShow()"
      [open]="isSideNavOpen()"
      class="h-full shrink-0 border-r shadow-sm"
    />

    <!-- Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden min-h-0">
      <main class="flex-1 flex flex-col px-4 py-3 overflow-auto lg:overflow-hidden min-h-0">
        <!-- Main Content Slot -->
        <div class="flex-1 flex flex-col lg:min-h-0 relative lg:overflow-hidden pb-1 pr-1">
          <router-outlet />
        </div>
      </main>

      <app-footer class="shrink-0" />
    </div>
  </div>
</div>
