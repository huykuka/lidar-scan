<div class="flex flex-col h-screen overflow-hidden bg-syn-page-background-color">
  <!-- Top Header -->
  <app-header #header class="z-50 shrink-0" label="LiDAR Studio" />

  <!--
    Main area mirrors the Synergy pattern:
      position:relative  → bounds the overlay on mobile (variant="default")
      display:flex       → sticky sidenav + content sit side-by-side on desktop (variant="sticky")
      overflow:hidden    → clips the canvas / 3D viewport, not the overlay (overlay is absolute inside main)
  -->
  <main class="flex flex-1 overflow-hidden relative min-h-0">
    <!-- Sidebar: inside <main> so the overlay covers only the content area -->
    <app-side-nav
      #sideNav
      (onHide)="handleSideNavHide()"
      (onShow)="handleSideNavShow()"
      [open]="isSideNavOpen()"
      class="z-30"
    />

    <!-- Content area -->
    <div class="flex-1 flex flex-col overflow-hidden min-h-0">
      <div class="flex-1 flex flex-col px-3 py-3 overflow-auto lg:overflow-hidden min-h-0">
        <div class="flex-1 flex flex-col lg:min-h-0 relative lg:overflow-hidden pb-1 pr-1">
          <router-outlet />
        </div>
      </div>

      <app-footer class="shrink-0" />
    </div>
  </main>
</div>
