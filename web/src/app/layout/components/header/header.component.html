<syn-header #header>
  <nav slot="meta-navigation" class="flex items-center">
    <app-connection-status (refresh)="onRefresh()" />
    <app-sensor-status />
    <!-- <app-notices-status (acknowledge)="onAcknowledge()" /> -->
    <app-platform-guide class="header-mobile-hidden" />
    <app-theme-switch class="header-mobile-hidden" />
    <app-user-info />
  </nav>

  <div slot="label" class="flex items-center gap-2 h-full">
    <span class="font-semibold text-lg whitespace-nowrap">
      {{ label() }}<span class="header-version"> v{{ uiVersion }}</span>
    </span>

    @if (headline()) {
      <span class="header-headline flex items-center gap-2">
        <syn-icon name="chevron_right" class="text-neutral-500 flex-shrink-0" />
        <span class="text-base font-bold self-center" style="color: var(--syn-color-neutral-700)">
          {{ headline() }}
        </span>
      </span>
    }
  </div>
</syn-header>
