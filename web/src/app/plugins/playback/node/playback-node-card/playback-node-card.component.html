<!-- Playback Node Card — compact status display for the flow canvas -->
<div class="flex flex-col gap-1 px-2 py-1 text-xs" data-testid="playback-node-card">

  <!-- Playback status badge -->
  @if (playbackBadge(); as badge) {
    <div
      [class]="'flex items-center gap-1 font-medium ' + badge.cssClass"
      data-testid="playback-badge"
    >
      <span>{{ badge.text }}</span>
    </div>
  }

  <!-- Config summary -->
  <div class="flex flex-col gap-0.5 text-syn-color-neutral-500 text-[10px]">
    <div class="flex items-center gap-1">
      <syn-icon name="speed" class="text-xs" />
      <span>{{ playbackSpeed() }}×</span>
      @if (loopable()) {
        <span class="ml-1 text-syn-color-primary-600">↺ loop</span>
      }
    </div>
  </div>

  <div class="flex flex-col gap-1 pt-2 border-t border-syn-color-neutral-100">
    <span class="text-[10px] text-syn-color-neutral-500 uppercase tracking-tighter pb-0.5">Transform</span>
    <div class="flex justify-between items-center w-full gap-2 min-w-0">
      <span class="text-[10px] text-syn-color-neutral-400 uppercase tracking-tighter shrink-0">Position</span>
      <span class="font-mono text-[11px] text-right shrink-0">{{ pose()[0] }}, {{ pose()[1] }}, {{ pose()[2] }}</span>
    </div>
    <div class="flex justify-between items-center w-full gap-2 min-w-0">
      <span class="text-[10px] text-syn-color-neutral-400 uppercase tracking-tighter shrink-0">Rotation</span>
      <span class="font-mono text-[11px] text-right shrink-0">{{ rotation()[0] }}°, {{ rotation()[1] }}°, {{ rotation()[2] }}°</span>
    </div>
  </div>

</div>
