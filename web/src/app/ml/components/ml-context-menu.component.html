<!-- ML Context Menu Component -->
<div 
  *ngIf="contextMenuService.contextMenu().visible"
  class="ml-context-menu"
  [style.left.px]="contextMenuService.contextMenu().x"
  [style.top.px]="contextMenuService.contextMenu().y"
  (click)="$event.stopPropagation()">
  
  <div class="context-menu-container">
    @for (item of contextMenuService.menuItems(); track item.id) {
      @if (item.label === '---') {
        <div class="menu-separator"></div>
      } @else {
        <button 
          class="menu-item"
          [class.disabled]="item.disabled"
          [disabled]="item.disabled"
          (click)="executeAction(item.id)">
          @if (item.icon) {
            <span class="menu-icon" [attr.data-icon]="item.icon">⚙</span>
          }
          <span class="menu-label">{{ item.label }}</span>
        </button>
      }
    }
  </div>
</div>
