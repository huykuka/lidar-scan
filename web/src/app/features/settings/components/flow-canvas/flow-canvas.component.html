<div class="flex h-full bg-syn-color-neutral-50 relative">
  <!-- Left Palette Sidebar -->
  <app-flow-canvas-palette
    [plugins]="availablePlugins()"
    [isLoading]="isPaletteLoading()"
    [zoom]="zoom()"
    (onResetView)="resetView()"
    (onPluginDragStart)="onPluginDragStart($event.plugin, $event.event)"
    (onPluginDragEnd)="onPaletteDragEnd()"
  ></app-flow-canvas-palette>

  <!-- Canvas Area -->
  <div class="flex-1 relative overflow-auto syn-scrollbar">
    <!-- Canvas Loading: Skeleton nodes + spinner overlay (scoped to canvas area only) -->
    @if (isCanvasLoading()) {
      <!-- Skeleton placeholder nodes -->
      <div class="absolute inset-0 z-40 pointer-events-none overflow-hidden">
        <!-- Skeleton Node 1 -->
        <div
          class="absolute w-72 rounded-lg bg-white shadow-lg border-2 border-syn-color-neutral-200 animate-pulse overflow-hidden"
          style="left: 100px; top: 80px; height: 160px;"
        >
          <div class="h-12 bg-syn-color-neutral-100"></div>
          <div class="p-4 space-y-2">
            <div class="h-3 bg-syn-color-neutral-100 rounded w-3/4"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-1/2"></div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-10 bg-syn-color-neutral-50 border-t border-syn-color-neutral-200 flex items-center px-4 gap-3">
            <div class="w-8 h-4 bg-syn-color-neutral-200 rounded-full"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-16"></div>
          </div>
        </div>

        <!-- Skeleton Node 2 -->
        <div
          class="absolute w-72 rounded-lg bg-white shadow-lg border-2 border-syn-color-neutral-200 animate-pulse overflow-hidden"
          style="left: 480px; top: 80px; height: 160px;"
        >
          <div class="h-12 bg-syn-color-neutral-100"></div>
          <div class="p-4 space-y-2">
            <div class="h-3 bg-syn-color-neutral-100 rounded w-2/3"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-5/12"></div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-10 bg-syn-color-neutral-50 border-t border-syn-color-neutral-200 flex items-center px-4 gap-3">
            <div class="w-8 h-4 bg-syn-color-neutral-200 rounded-full"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-16"></div>
          </div>
        </div>

        <!-- Skeleton Node 3 -->
        <div
          class="absolute w-72 rounded-lg bg-white shadow-lg border-2 border-syn-color-neutral-200 animate-pulse overflow-hidden"
          style="left: 100px; top: 310px; height: 160px;"
        >
          <div class="h-12 bg-syn-color-neutral-100"></div>
          <div class="p-4 space-y-2">
            <div class="h-3 bg-syn-color-neutral-100 rounded w-3/4"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-1/3"></div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-10 bg-syn-color-neutral-50 border-t border-syn-color-neutral-200 flex items-center px-4 gap-3">
            <div class="w-8 h-4 bg-syn-color-neutral-200 rounded-full"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-16"></div>
          </div>
        </div>

        <!-- Skeleton Node 4 -->
        <div
          class="absolute w-72 rounded-lg bg-white shadow-lg border-2 border-syn-color-neutral-200 animate-pulse overflow-hidden"
          style="left: 480px; top: 310px; height: 160px;"
        >
          <div class="h-12 bg-syn-color-neutral-100"></div>
          <div class="p-4 space-y-2">
            <div class="h-3 bg-syn-color-neutral-100 rounded w-2/3"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-1/2"></div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-10 bg-syn-color-neutral-50 border-t border-syn-color-neutral-200 flex items-center px-4 gap-3">
            <div class="w-8 h-4 bg-syn-color-neutral-200 rounded-full"></div>
            <div class="h-3 bg-syn-color-neutral-100 rounded w-16"></div>
          </div>
        </div>

        <!-- Skeleton Edge line connecting node 1 and 2 -->
        <svg class="absolute inset-0 w-full h-full" style="z-index: 1;">
          <path
            d="M 388 124 C 430 124, 438 124, 480 124"
            stroke="#e5e7eb"
            stroke-width="2"
            fill="none"
            stroke-dasharray="6 4"
            class="animate-pulse"
          />
        </svg>
      </div>

      <!-- Spinner overlay on top of skeletons -->
      <div class="absolute inset-0 z-50 flex items-center justify-center bg-white/40 backdrop-blur-sm">
        <syn-spinner class="text-3xl text-syn-color-primary-600"></syn-spinner>
      </div>
    }

    <div
      class="relative"
      [style.min-width]="canvasWidth()"
      [style.min-height]="canvasHeight()"
      [style.cursor]="
        pendingConnection()
          ? 'crosshair'
          : isPanning()
            ? 'grabbing'
            : paletteDragType()
              ? 'copy'
              : 'default'
      "
      (mousedown)="onCanvasMouseDown($event)"
      (mousemove)="onCanvasMouseMove($event)"
      (mouseup)="onCanvasMouseUp($event)"
      (wheel)="onCanvasWheel($event)"
      (dragover)="onCanvasDragOver($event)"
      (drop)="onCanvasDrop($event)"
    >
      <!-- Grid Background -->
      <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="#e5e7eb" />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
      </svg>

      <!-- Nodes Container -->
      <div
        class="absolute inset-0"
        [style.transform]="
          'translate(' + panOffset().x + 'px, ' + panOffset().y + 'px) scale(' + zoom() + ')'
        "
        [style.transform-origin]="'0 0'"
      >
        <!-- Connection Lines Layer (below nodes) -->
        <app-flow-canvas-connections
          [connections]="connections()"
          [pendingPath]="pendingPath()"
          (onDelete)="onDeleteEdge($event)"
        ></app-flow-canvas-connections>

        <!-- Nodes Layer -->
        @for (node of canvasNodes(); track node.id) {
          <div
            class="absolute transition-shadow"
            [class.ring-4]="selectedCanvasNode()?.id === node.id"
            [class.ring-syn-color-primary-500]="selectedCanvasNode()?.id === node.id"
            [class.ring-offset-2]="selectedCanvasNode()?.id === node.id"
            [class.ring-offset-white]="selectedCanvasNode()?.id === node.id"
            [class.rounded-lg]="selectedCanvasNode()?.id === node.id"
            [class.shadow-2xl]="selectedCanvasNode()?.id === node.id"
            [class.z-10]="selectedCanvasNode()?.id === node.id"
            [style.left.px]="node.position.x"
            [style.top.px]="node.position.y"
            [style.cursor]="
              draggingNode()?.id === node.id ? 'grabbing' : pendingConnection() ? 'default' : 'grab'
            "
            (mousedown)="onNodeMouseDown($event, node)"
            (dblclick)="onEditNode(node)"
            title="Double-click to edit"
          >
            <app-flow-canvas-node
              [node]="node"
              [status]="getNodeStatus(node)"
              [isLoading]="isNodeLoading(node.id)"
              [isDragging]="draggingNode()?.id === node.id"
              (onEdit)="onEditNode(node)"
              (onToggleEnabled)="onToggleNodeEnabled(node, $event)"
              (portDragStart)="onPortDragStart($event)"
              (portDrop)="onPortDrop($event)"
            ></app-flow-canvas-node>
          </div>
        }
      </div>

      <!-- Empty State -->
      @if (canvasNodes().length === 0) {
        <app-flow-canvas-empty-state></app-flow-canvas-empty-state>
      }
    </div>
  </div>

  <!-- Node Editor Drawer -->
  <syn-drawer
    contained
    noHeader
    placement="end"
    style="--size: 480px"
    [open]="drawerOpen()"
    (syn-after-hide)="onDrawerClose()"
  >
    @if (drawerOpen()) {
      <app-dynamic-node-editor
        (save)="onDrawerClose()"
        (cancel)="onDrawerClose()"
      />
    }
  </syn-drawer>
</div>
