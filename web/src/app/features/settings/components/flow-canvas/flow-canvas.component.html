<div class="flex h-full bg-syn-color-neutral-50 relative">
  <!-- Left Palette Sidebar -->
  <app-flow-canvas-palette (onPluginDragEnd)="onPaletteDragEnd()"
                           (onPluginDragStart)="onPluginDragStart($event.plugin, $event.event)"
                           (onResetView)="resetView()"
                           [isLoading]="isPaletteLoading()"
                           [plugins]="availablePlugins()"
                           [zoom]="zoom()"
  />

  <!-- Canvas Area -->
  <div class="flex-1 relative overflow-auto syn-scrollbar">
    <div
      (dragover)="onCanvasDragOver($event)"
      (drop)="onCanvasDrop($event)"
      (mousedown)="onCanvasMouseDown($event)"
      (mousemove)="onCanvasMouseMove($event)"
      (mouseup)="onCanvasMouseUp($event)"
      (wheel)="onCanvasWheel($event)"
      [style.cursor]="
        drag.pendingConnection()
          ? 'crosshair'
          : drag.isPanning()
            ? 'grabbing'
            : drag.paletteDragType()
              ? 'copy'
              : 'default'
      "
      [style.min-height]="canvasHeight()"
      [style.min-width]="canvasWidth()"
      class="relative"
    >
      <!-- Grid Background -->
      <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <defs>
          <pattern height="20" id="grid" patternUnits="userSpaceOnUse" width="20">
            <circle cx="1" cy="1" fill="#e5e7eb" r="1"/>
          </pattern>
        </defs>
        <rect fill="url(#grid)" height="100%" width="100%"/>
      </svg>

      <!-- Nodes Container -->
      <div
        [style.transform-origin]="'0 0'"
        [style.transform]="
          'translate(' + panOffset().x + 'px, ' + panOffset().y + 'px) scale(' + zoom() + ')'
        "
        class="absolute inset-0"
      >
        <!-- Connection Lines Layer (below nodes) -->
        <app-flow-canvas-connections (onDelete)="onDeleteEdge($event)"
                                     [connections]="connections()"
                                     [pendingPath]="drag.pendingPath()"
        />

        <!-- Nodes Layer -->
        @for (node of canvasNodes(); track node.id) {
          <div
            (dblclick)="onEditNode(node)"
            (mousedown)="onNodeMouseDown($event, node)"
            [class.ring-4]="selectedCanvasNode()?.id === node.id"
            [class.ring-offset-2]="selectedCanvasNode()?.id === node.id"
            [class.ring-offset-white]="selectedCanvasNode()?.id === node.id"
            [class.rounded-lg]="selectedCanvasNode()?.id === node.id"
            [class.shadow-2xl]="selectedCanvasNode()?.id === node.id"
            [class.z-10]="selectedCanvasNode()?.id === node.id"
            [style.cursor]="
              drag.draggingNode()?.id === node.id ? 'grabbing' : drag.pendingConnection() ? 'default' : 'grab'
            "
            [style.left.px]="node.position.x"
            [style.top.px]="node.position.y"
            class="absolute transition-shadow"
            title="Double-click to edit"
          >
            <app-flow-canvas-node (onEdit)="onEditNode(node)"
                                  (onToggleEnabled)="onToggleNodeEnabled(node, $event)"
                                  (portDragStart)="onPortDragStart($event)"
                                  (portDrop)="onPortDrop($event)"
                                  [isDragging]="drag.draggingNode()?.id === node.id"
                                  [isLoading]="isNodeLoading(node.id)"
                                  [node]="node"
                                  [status]="getNodeStatus(node)"
            />
          </div>
        }
      </div>

      <!-- Empty State -->
      @if (canvasNodes().length === 0) {
        <app-flow-canvas-empty-state/>
      }
    </div>
  </div>

  <!-- Node Editor Drawer -->
  <syn-drawer
    (synHideEvent)="onDrawerClose()"
    [open]="drawerOpen()"
    noHeader
    placement="end"
    style="--size: 480px"
  >
    @if (drawerOpen()) {
      <app-dynamic-node-editor
        (cancel)="onDrawerClose()"
        (save)="onDrawerClose()"
      />
    }
  </syn-drawer>
</div>
