<!-- Unified canvas toolbar -->
<div class="controls-toolbar">
  <syn-tooltip content="Fit to screen" placement="top">
    <syn-icon-button
      name="expand_content"
      label="Fit to screen"
      size="small"
      color="neutral"
      (click)="action.emit('fit-to-screen')"
    />
  </syn-tooltip>

  <syn-tooltip content="Reset zoom (1:1)" placement="top">
    <syn-icon-button
      name="center_focus_strong"
      label="Reset zoom (1:1)"
      size="small"
      color="neutral"
      (click)="action.emit('one-to-one')"
    />
  </syn-tooltip>

  <span class="divider"></span>

  <syn-tooltip content="Zoom out" placement="top">
    <syn-icon-button
      name="zoom_out"
      label="Zoom out"
      size="small"
      color="neutral"
      (click)="action.emit('zoom-out')"
    />
  </syn-tooltip>

  <syn-tooltip content="Zoom in" placement="top">
    <syn-icon-button
      name="zoom_in"
      label="Zoom in"
      size="small"
      color="neutral"
      (click)="action.emit('zoom-in')"
    />
  </syn-tooltip>

  <span class="divider"></span>

  <syn-tooltip [content]="snapToGrid() ? 'Snap to grid: ON' : 'Snap to grid: OFF'" placement="top">
    <syn-icon-button
      name="grid_4x4"
      label="Snap to grid"
      size="small"
      [color]="snapToGrid() ? 'primary' : 'neutral'"
      (click)="action.emit('snap-toggle')"
    />
  </syn-tooltip>

  <syn-tooltip [content]="minimapVisible() ? 'Hide minimap' : 'Show minimap'" placement="top">
    <syn-icon-button
      name="pip"
      label="Toggle minimap"
      size="small"
      [color]="minimapVisible() ? 'primary' : 'neutral'"
      (click)="action.emit('minimap-toggle')"
    />
  </syn-tooltip>

  <syn-tooltip [content]="liveStatus() ? 'Pause live status (improve performance)' : 'Resume live status'" placement="top">
    <syn-icon-button
      name="autorenew"
      label="Toggle live status"
      size="small"
      [color]="liveStatus() ? 'primary' : 'neutral'"
      (click)="action.emit('live-status-toggle')"
    />
  </syn-tooltip>

  <span class="divider"></span>

  <syn-tooltip content="Undo (Ctrl+Z)" placement="top">
    <syn-icon-button
      name="undo"
      label="Undo"
      size="small"
      color="neutral"
      [disabled]="!canUndo()"
      (click)="action.emit('undo')"
    />
  </syn-tooltip>

  <syn-tooltip content="Redo (Ctrl+Y)" placement="top">
    <syn-icon-button
      name="redo"
      label="Redo"
      size="small"
      color="neutral"
      [disabled]="!canRedo()"
      (click)="action.emit('redo')"
    />
  </syn-tooltip>

  <syn-tooltip content="Reset to saved state" placement="top">
    <syn-icon-button
      name="settings_backup_restore"
      label="Reset to saved state"
      size="small"
      color="neutral"
      (click)="action.emit('reset')"
    />
  </syn-tooltip>

  <span class="divider"></span>

  <syn-tooltip content="Keyboard shortcuts" placement="top">
    <syn-icon-button
      id="hint-anchor"
      name="keyboard"
      label="Keyboard shortcuts"
      size="small"
      [color]="hintOpen() ? 'primary' : 'neutral'"
      (click)="hintOpen.set(!hintOpen())"
    />
  </syn-tooltip>
</div>

<!-- Shortcuts popup -->
@if (hintOpen()) {
  <div class="hint-backdrop" (click)="hintOpen.set(false)"></div>
}
<syn-popup
  anchor="hint-anchor"
  placement="top-end"
  [active]="hintOpen()"
  [distance]="8"
  flip
  shift
>
  <div class="hint-panel">
    <div class="hint-header">
      <span class="hint-title">Shortcuts</span>
      <syn-icon-button
        name="close"
        label="Close"
        size="small"
        color="neutral"
        (click)="hintOpen.set(false)"
      />
    </div>
    <ul class="hint-list">
      @for (h of hints; track h.key) {
        <li class="hint-row">
          <syn-icon [name]="h.icon" class="hint-icon" [style.color]="h.color" />
          <kbd class="hint-key">{{ h.key }}</kbd>
          <span class="hint-desc">{{ h.desc }}</span>
        </li>
      }
    </ul>
  </div>
</syn-popup>
