<div class="flex flex-col gap-2.5 bg-white border border-neutral-200 rounded-2xl shadow-xl px-4 py-3 w-[200px]">

  <!-- Zoom row: label · − · percentage · + -->
  <div class="flex items-center justify-between gap-1">
    <span class="text-[9px] font-semibold uppercase tracking-widest text-neutral-400 mr-auto">Zoom</span>
    <button
      (click)="onZoomOut.emit()"
      title="Zoom out"
      class="w-5 h-5 flex items-center justify-center rounded-full border border-neutral-200 text-neutral-500 hover:bg-neutral-100 transition-colors text-[13px] font-bold leading-none select-none"
    >−</button>
    <span class="text-[11px] font-mono font-bold text-neutral-700 w-9 text-center">
      {{ (zoom() * 100).toFixed(0) }}%
    </span>
    <button
      (click)="onZoomIn.emit()"
      title="Zoom in"
      class="w-5 h-5 flex items-center justify-center rounded-full border border-neutral-200 text-neutral-500 hover:bg-neutral-100 transition-colors text-[13px] font-bold leading-none select-none"
    >+</button>
  </div>

  <!-- Reset View -->
  <button
    (click)="onResetView.emit()"
    class="flex items-center justify-center gap-1.5 w-full px-3 py-2 rounded-full border border-neutral-300 text-[12px] font-bold text-neutral-800 bg-white hover:bg-neutral-50 transition-colors"
  >
    <syn-icon name="center_focus_strong" class="text-sm" />
    Reset View
  </button>

  <!-- Snap to Grid toggle -->
  <button
    (click)="onSnapToggle.emit()"
    [class.bg-blue-600]="snapToGrid()"
    [class.text-white]="snapToGrid()"
    [class.border-blue-600]="snapToGrid()"
    [class.bg-white]="!snapToGrid()"
    [class.text-neutral-500]="!snapToGrid()"
    [class.border-neutral-300]="!snapToGrid()"
    [title]="snapToGrid() ? 'Snap to grid: on — click to disable' : 'Snap to grid: off — click to enable'"
    class="flex items-center justify-center gap-1.5 w-full px-3 py-2 rounded-full border text-[12px] font-bold transition-colors"
  >
    <syn-icon name="grid_4x4" class="text-sm" />
    Snap to Grid
  </button>

</div>
