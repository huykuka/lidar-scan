<svg class="absolute inset-0 w-full h-full pointer-events-none" style="overflow: visible">
  <defs>
    <marker id="arrowhead" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3">
      <polygon fill="#6366f1" points="0 0, 10 3, 0 6"/>
    </marker>
    <marker
      id="arrowhead-pending"
      markerHeight="10"
      markerWidth="10"
      orient="auto"
      refX="9"
      refY="3"
    >
      <polygon fill="#94a3b8" points="0 0, 10 3, 0 6"/>
    </marker>
  </defs>

  @for (connection of connections(); track connection.id ?? $index) {
    <g
      (click)="connection.id ? onDelete.emit(connection.id) : null"
      class="cursor-pointer group"
      title="Click to delete connection"
    >
      <path
        [attr.d]="connection.path"
        class="edge-path group-hover:stroke-red-500 transition-colors pointer-events-none"
        fill="none"
        marker-end="url(#arrowhead)"
        pathLength="1"
        stroke="#6366f1"
        stroke-width="2"
      />
      <path
        [attr.d]="connection.path"
        class="edge-flow-overlay pointer-events-none"
        fill="none"
        pathLength="1"
        stroke="#a5b4fc"
        stroke-width="2"
      />
      <path
        [attr.d]="connection.path"
        class="pointer-events-auto"
        fill="none"
        stroke="transparent"
        stroke-width="15"
      />
    </g>
  }

  @if (pendingPath()) {
    <path
      [attr.d]="pendingPath()"
      fill="none"
      marker-end="url(#arrowhead-pending)"
      stroke="#94a3b8"
      stroke-dasharray="6 3"
      stroke-width="2"
    >
      <animate
        attributeName="stroke-dashoffset"
        dur="0.5s"
        from="0"
        repeatCount="indefinite"
        to="-18"
      />
    </path>
  }
</svg>
