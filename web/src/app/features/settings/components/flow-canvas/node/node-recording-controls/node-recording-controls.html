@if (isRecording()) {
  <syn-button
    (click)="toggleRecording(); $event.stopPropagation()"
    color="danger"
    size="small"
    variant="filled"
  >
    <syn-icon class="animate-pulse" name="stop" slot="prefix" />
    <span class="text-xs">{{ formatDuration(recordingDuration()) }}</span>
  </syn-button>
} @else {
  <syn-button
    (click)="toggleRecording(); $event.stopPropagation()"
    size="small"
    title="Start Recording"
    variant="text"
  >
    <syn-icon name="fiber_manual_record" style="color: var(--syn-color-error-700)" />
  </syn-button>
}
