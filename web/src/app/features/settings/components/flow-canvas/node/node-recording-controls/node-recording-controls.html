@if (isRecording()) {
  <button
    (click)="toggleRecording(); $event.stopPropagation()"
    class="flex items-center justify-center gap-1.5 px-2 py-0.5 rounded-full bg-syn-color-error-50 text-syn-color-error-700 hover:bg-syn-color-error-100 transition-all border border-syn-color-error-200 h-[26px] ml-auto"
  >
    <syn-icon class="animate-pulse text-[14px]" name="stop" />
    <span class="font-mono text-[11px] font-black tracking-tighter leading-none pt-[1px]">{{
      formatDuration(recordingDuration())
    }}</span>
  </button>
} @else {
  <syn-icon-button variant="text"
    style="color: var(--syn-color-error-600)"
    name="radio_button_checked"
    (click)="toggleRecording(); $event.stopPropagation()"
    [disabled]="hasError()"
    [label]="hasError() ? 'Cannot record: node is in error state' : 'Start Recording'"
   />
}
