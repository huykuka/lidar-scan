@if (hasPendingCalibration()) {
  <!-- Pending Calibration - Accept/Reject Buttons -->
  <div class="flex">
    <syn-icon-button
      (click)="acceptCalibration(); $event.stopPropagation()"
      [disabled]="isCalibrating()"
      label="Accept Calibration"
      name="check"
      size="small"
      class="text-syn-color-success-600"
      title="Accept & Save Calibration"
    />
    <syn-icon-button
      (click)="rejectCalibration(); $event.stopPropagation()"
      [disabled]="isCalibrating()"
      label="Reject Calibration"
      name="close"
      size="small"
      class="text-syn-color-danger-600"
      title="Reject Calibration"
    />
  </div>
} @else {
  <!-- Trigger Calibration Button -->
  <syn-icon-button
    (click)="triggerCalibration(); $event.stopPropagation()"
    [disabled]="isCalibrating()"
    label="Trigger Calibration"
    [name]="isCalibrating() ? 'sync' : 'tune'"
    [class.animate-spin]="isCalibrating()"
    size="small"
    class="text-syn-color-primary-600"
    title="Run Calibration"
  />
}
