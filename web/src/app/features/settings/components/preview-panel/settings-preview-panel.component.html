<div class="preview-container">
  <app-preview-header
    [topicCount]="topicCount()"
    [showGizmos]="showGizmos()"
    [isConnected]="isConnected()"
    (gizmoToggle)="showGizmos.set(!showGizmos())"
  />

  <app-preview-topic-list
    [topics]="previewTopics()"
    (removeTopic)="removePreviewTopic($event)"
  />

  <div class="flex-1 min-h-0 relative">
    @if (topicCount() === 0) {
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-[var(--syn-typography-color-text-quiet)] z-[1] pointer-events-none">
        <syn-icon name="sensors_off" style="font-size: 32px; opacity: 0.4" />
        <span class="text-sm font-semibold">No nodes previewed</span>
        <span class="text-xs max-w-[180px] text-center">Right-click a node and select "Add to 3D view" to see its output here</span>
      </div>
    }
    <ngt-canvas class="absolute inset-0"  frameloop="demand">
      <app-threed-scene-graph *canvasContent [showGrid]="showGrid()" [viewType]="viewOrientation()">
        <app-preview-scene
          [entries]="topicEntries()"
          [showGizmos]="showGizmos()"
          [frames]="frames()"
          [maxPoints]="MAX_POINTS"
          (dragged)="onPivotDrag($event.topic, $event.event)"
          (dragEnded)="onPivotDragEnd($event)"
        />
      </app-threed-scene-graph>
    </ngt-canvas>
    <app-shared-viewport-overlay
      [orientation]="viewOrientation()"
      [showGrid]="showGrid()"
      [hasData]="topicCount() > 0"
      (orientationChange)="viewOrientation.set($event)"
      (gridToggle)="showGrid.set($event)"
    />
  </div>
</div>
