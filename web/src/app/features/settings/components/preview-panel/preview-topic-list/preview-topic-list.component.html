@if (topics().length > 0) {
  <div class="flex flex-col border-b border-[var(--syn-panel-border-color)] shrink-0 max-h-[120px] overflow-y-auto">
    @for (t of topics(); track t.topic) {
      <div class="flex items-center gap-1 px-3 py-0.5">
        <span class="w-2 h-2 rounded-full shrink-0" [style.background]="t.color"></span>
        <span class="text-[10px] text-[var(--syn-typography-color-text)] flex-1 overflow-hidden text-ellipsis whitespace-nowrap">{{ t.nodeName }}</span>
        <syn-icon-button
          name="close"
          label="Remove from preview"
          size="small"
          color="neutral"
          (click)="removeTopic.emit(t.topic)"
        />
      </div>
    }
  </div>
}
