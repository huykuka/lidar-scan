<syn-select
  size="small"
  [label]="label()"
  [value]="value()"
  [helpText]="helpText()"
  (syn-change)="onSelectChange($event)"
>
  @if (selectedOption(); as opt) {
    <div slot="prefix" class="flex items-center">
      <img
        [src]="opt.imageSrc"
        [alt]="opt.label + ' LiDAR device'"
        class="w-5 h-5 rounded-md border border-syn-color-neutral-200 bg-white flex-shrink-0"
        style="object-fit: contain; padding: 1px; margin-right: 6px"
        (error)="handleImageError($event)"
      />
    </div>
  }

  @for (opt of options(); track opt.value) {
    <syn-option [value]="opt.value">
      <img
        slot="prefix"
        [src]="opt.imageSrc"
        [alt]="opt.label + ' LiDAR device'"
        class="w-6 h-6 rounded-md border border-syn-color-neutral-200 bg-white flex-shrink-0"
        style="object-fit: contain; padding: 2px; margin-right: 8px"
        (error)="handleImageError($event)"
      />
      {{ opt.label }}
    </syn-option>
  }
</syn-select>
