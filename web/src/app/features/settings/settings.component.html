<div class="flex flex-col gap-6 animate-in fade-in duration-500">
  <!-- Flow Canvas Section -->
  <div
    class="bg-white rounded-xl shadow-sm border border-syn-color-neutral-200 overflow-hidden flex flex-col"
    style="height: calc(100vh - 200px)"
  >
    <!-- Toolbar -->
    <div class="border-b border-syn-color-neutral-200 bg-syn-color-neutral-50 flex-shrink-0">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex gap-2">
          <syn-button
            (click)="onExportConfig()"
            [disabled]="isExporting()"
            [loading]="isExporting()"
            size="small"
            variant="outline"
          >
            <syn-icon name="download" slot="prefix"></syn-icon>
            Export
          </syn-button>
          <syn-button
            (click)="onImportConfigClick()"
            [disabled]="isExporting()"
            [loading]="isImporting()"
            size="small"
            variant="outline"
          >
            <syn-icon name="upload" slot="prefix"></syn-icon>
            Import
          </syn-button>
          <syn-button (click)="onReloadConfig()" size="small" variant="outline">
            <syn-icon name="save" slot="prefix"></syn-icon>
            Save & Reload
          </syn-button>

          @if (isSystemRunning()) {
            <syn-button (click)="onStopSystem()" color="danger" size="small" variant="filled">
              <syn-icon name="stop" slot="prefix"></syn-icon>
              Stop Data Flow
            </syn-button>
          } @else {
            <syn-button (click)="onStartSystem()" color="success" size="small" variant="filled">
              <syn-icon name="play_arrow" slot="prefix"></syn-icon>
              Start Data Flow
            </syn-button>
          }
        </div>
      </div>
    </div>

    <!-- Flow Canvas -->
    <div class="flex-1 overflow-hidden">
      <app-flow-canvas (hasUnsavedChangesChange)="hasUnsavedChanges.set($event)"/>
    </div>
  </div>

  <!-- Configuration Import Validation Dialog -->
  <app-config-import-dialog
    (cancel)="onCancelImport()"
    (confirm)="onConfirmImport()"
    (requestClose)="onCancelImport()"
    [(mergeMode)]="importMergeMode"
    [isImporting]="isImporting()"
    [open]="showValidationDialog()"
    [validationResult]="validationResult()"
  />
</div>
