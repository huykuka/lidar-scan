<div class="h-full flex flex-col animate-in fade-in duration-500">
  <!-- Flow Canvas Panel: fills the remaining space given by the router-outlet container -->
  <div class="rounded-xl shadow-sm overflow-hidden flex flex-col flex-1 min-h-0 border-syn">
    <!-- Single unified toolbar -->
    <div
      class="flex items-center justify-between bg-syn-page-background-color gap-3 px-4 py-2.5 shrink-0 border-b-syn"
    >
      <!-- Left: file actions + system control -->
      <div class="flex items-center gap-2">
        <syn-tooltip
          [content]="canEdit() ? 'Export configuration' : 'Admin access required'"
          [distance]="13"
          placement="bottom"
        >
          <syn-button
            (click)="onExportConfig()"
            [disabled]="isExporting()"
            [loading]="isExporting()"
            variant="outline"
          >
            <syn-icon name="download" slot="prefix" />
            Export
          </syn-button>
        </syn-tooltip>

        <syn-tooltip
          [content]="canEdit() ? 'Import configuration' : 'Admin access required'"
          [distance]="13"
          placement="bottom"
        >
          <syn-button
            (click)="onImportConfigClick()"
            [disabled]="isImporting() || !canEdit()"
            [loading]="isImporting()"
            variant="outline"
          >
            <syn-icon name="upload" slot="prefix" />
            Import
          </syn-button>
        </syn-tooltip>

        <div class="w-px h-5 bg-syn-color-neutral-200 mx-1"></div>

        @if (isSystemRunning()) {
          <syn-tooltip
            [content]="canEdit() ? 'Stop system' : 'Admin access required'"
            [distance]="13"
            placement="bottom"
          >
            <syn-button
              (click)="onStopSystem()"
              [disabled]="!canEdit()"
              variant="filled"
            >
              <syn-icon name="stop" slot="prefix" />
              Stop
            </syn-button>
          </syn-tooltip>
        } @else {
          <syn-tooltip
            [content]="canEdit() ? 'Start system' : 'Admin access required'"
            [distance]="13"
            placement="bottom"
          >
            <syn-button
              (click)="onStartSystem()"
              [disabled]="!canEdit()"
              variant="outline"
            >
              <syn-icon name="play_arrow" slot="prefix" />
              Start
            </syn-button>
          </syn-tooltip>
        }
      </div>

      <!-- Right: dirty badge + canvas actions -->
      <div class="flex items-center gap-2">
        @if (canvasEditStore.isDirty()) {
          <span
            class="flex items-center gap-1 px-2 py-0.5 rounded border border-syn-color-warning-300 bg-syn-color-warning-50 text-xs font-semibold text-syn-color-warning-700"
          >
            <span class="text-syn-color-warning-500 text-[10px] leading-none">●</span>
            Unsaved
          </span>
        }

        <syn-tooltip
          [content]="canEdit() ? 'Restart backend runtime without saving' : 'Admin access required'"
          [distance]="13"
          placement="bottom"
        >
          <syn-button
            variant="outline"
            [loading]="canvasEditStore.isReloading()"
            [disabled]="canvasEditStore.isReloading() || !canEdit()"
            (click)="onReloadRuntime()"
          >
            <syn-icon name="refresh" slot="prefix" />
            <span> Reload </span>
          </syn-button>
        </syn-tooltip>

        <syn-tooltip
          content="Pull latest config from backend"
          [distance]="13"
          placement="bottom"
        >
          <syn-button
            variant="outline"
            [disabled]="canvasEditStore.isSyncing()"
            (click)="onSync()"
            [loading]="canvasEditStore.isSyncing()"
          >
              <syn-icon name="sync" slot="prefix" />
              <span> Sync </span>
          </syn-button>
        </syn-tooltip>

        <syn-tooltip
          [content]="canEdit() ? 'Apply changes to backend' : 'Admin access required'"
          [distance]="13"
          placement="bottom"
        >
          <syn-button
            variant="filled"
            [disabled]="
              !canEdit() ||
              !canvasEditStore.isDirty() ||
              canvasEditStore.isSaving() ||
              !canvasEditStore.isValid() ||
              isNodeReloading()
            "
            (click)="onApply()"
            [loading]="canvasEditStore.isSaving()"
          >
            <syn-icon name="save" slot="prefix" />
            <span> Apply </span>
          </syn-button>
        </syn-tooltip>
      </div>
    </div>

    <!-- Read-only notice for users without edit permission -->
    @if (!canEdit()) {
      <div
        class="flex items-center gap-2 px-4 py-2 bg-syn-color-neutral-100 border-b text-xs text-syn-color-neutral-600 shrink-0"
      >
        <syn-icon name="info" style="font-size: 1rem" />
        <span>Read-only mode — sign in as admin to make changes</span>
      </div>
    }

    <!-- Canvas + Preview split -->
    <div class="flex-1 min-h-0 overflow-hidden relative flex">
      <!-- Flow Canvas (left pane) -->
      <div class="flex-1 min-w-0 min-h-0 overflow-hidden relative">
        <app-flow-canvas
          [readOnly]="!canEdit()"
          [previewedNodeIds]="previewedNodeIds()"
          (onTogglePreview)="onToggleNodePreview($event)"
        />
      </div>

      <!-- Preview toggle (when preview is collapsed) -->
      @if (!previewOpen()) {
        <div class="flex items-center border-l-syn">
          <syn-tooltip content="Open live preview" placement="left">
            <syn-icon-button
              name="visibility"
              label="Open live preview"
              size="small"
              color="neutral"
              (click)="previewOpen.set(true)"
            />
          </syn-tooltip>
        </div>
      }

      <!-- Resizable divider + Preview (right pane) -->
      @if (previewOpen()) {
        <div
          class="settings-divider"
          (pointerdown)="onDividerDown($event)"
        ></div>
        <div
          class="min-h-0 overflow-hidden relative flex flex-col"
          [style.width.px]="previewWidth()"
        >
          <div class="flex items-center justify-end px-1 py-0.5 border-b-syn shrink-0">
            <syn-tooltip content="Close preview" placement="left">
              <syn-icon-button
                name="visibility_off"
                label="Close preview"
                size="small"
                color="neutral"
                (click)="previewOpen.set(false)"
              />
            </syn-tooltip>
          </div>
          <div class="flex-1 min-h-0">
            <app-settings-preview-panel />
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Configuration Import Validation Dialog -->
  <app-config-import-dialog
    (cancel)="onCancelImport()"
    (confirm)="onConfirmImport()"
    (requestClose)="onCancelImport()"
    [(mergeMode)]="importMergeMode"
    [isImporting]="isImporting()"
    [open]="showValidationDialog()"
    [validationResult]="validationResult()"
  />
</div>
