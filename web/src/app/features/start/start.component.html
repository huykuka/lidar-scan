<div class="w-full bg-syn-page-background-color rounded-2xl shadow-sm border p-6 sm:p-8 animate-in fade-in duration-300">
  <div class="w-full max-w-4xl mx-auto">
    <div class="flex items-start gap-3 sm:gap-4">
      <syn-icon class="text-syn-color-primary-700 text-2xl sm:text-3xl mt-1" name="info" />
      <div class="space-y-3">
        <h2 class="text-lg sm:text-2xl font-bold text-syn-typography-color-text">
          Platform Guide Moved To Header
        </h2>
        <p class="text-sm sm:text-base leading-relaxed text-syn-typography-color-text">
          The full feature overview, quick navigation cards, and getting-started checklist are now
          available in the header guide drawer.
        </p>
        <p class="text-sm sm:text-base leading-relaxed text-syn-typography-color-text">
          Click the <strong>info</strong> icon in the top header to open or close the guide at any time.
        </p>
        <div class="pt-2">
          <button
            type="button"
            (click)="navigateTo('/workspaces')"
            class="px-4 py-2 rounded-lg border bg-syn-color-primary-50 hover:bg-syn-color-primary-100 text-syn-color-primary-700 font-medium transition-colors"
          >
            Go to Workspaces
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
