<div class="login-page">
  <div class="login-container">
    <div class="login-branding">
      <syn-icon name="sensors" class="login-logo" />
      <h1 class="login-title">3D LiDAR Control Cockpit</h1>
      <p class="login-subtitle">Sign in to continue</p>
    </div>

    <syn-card class="login-card">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <syn-input
          label="Username"
          placeholder="Enter your username"
          formControlName="username"
          required
          autocomplete="username"
        >
          <syn-icon name="person" slot="prefix" />
        </syn-input>

        <syn-input
          label="Password"
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          required
          password-toggle
          autocomplete="current-password"
        >
          <syn-icon name="lock" slot="prefix" />
        </syn-input>

        <syn-button
          type="submit"
          variant="filled"
          class="login-submit"
          [loading]="isLoading()"
          [disabled]="isLoading() || form.invalid"
        >
          <syn-icon name="login" slot="prefix" />
          Sign In
        </syn-button>
      </form>
    </syn-card>

    <p class="login-hint">
      Default credentials: admin / admin
    </p>
  </div>
</div>
