<div class="flex flex-col h-full bg-neutral-100">
  <!-- Header -->
  <header class="bg-white border-b border-neutral-300 px-6 py-3">
    <div class="flex items-center gap-4">
      <syn-button (click)="goBack()" size="small" variant="text">
        <syn-icon name="arrow_back" slot="prefix" />
        Back
      </syn-button>
      <div class="flex items-center gap-3">
        <syn-icon class="text-2xl text-primary-600" name="history" />
        <div>
          <h1 class="text-xl font-semibold text-neutral-900 m-0">Calibration History</h1>
          <p class="text-xs font-mono text-neutral-600 m-0">{{ nodeId() }}</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <div class="bg-white border-b border-neutral-200 px-6">
    <div class="flex gap-4">
      <button
        class="py-3 text-sm font-medium border-b-2 transition-colors"
        [class]="activeTab() === 'history' ? 'border-primary-600 text-primary-700' : 'border-transparent text-neutral-600 hover:text-neutral-900'"
        (click)="setTab('history')"
        aria-label="Show calibration history table"
      >
        History
      </button>
      <button
        class="py-3 text-sm font-medium border-b-2 transition-colors"
        [class]="activeTab() === 'statistics' ? 'border-primary-600 text-primary-700' : 'border-transparent text-neutral-600 hover:text-neutral-900'"
        (click)="setTab('statistics')"
        aria-label="Show calibration statistics"
      >
        Statistics
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-auto p-6">
    @if (isLoading()) {
      <div class="flex flex-col items-center justify-center h-64 gap-4 text-neutral-600">
        <syn-spinner size="large" />
        <p>Loading calibration data…</p>
      </div>
    } @else if (error()) {
      <syn-alert open variant="danger">
        <syn-icon name="error" slot="icon" />
        <strong>Failed to load</strong>
        <div>{{ error() }}</div>
      </syn-alert>
    } @else {
      <!-- History Tab -->
      @if (activeTab() === 'history') {
        <div class="max-w-7xl mx-auto">
          <app-calibration-history-table
            [records]="historyRecords()"
            (filterByRunId)="onFilterByRunId($event)"
            (viewDetail)="onViewDetail($event)"
          />
        </div>
      }

      <!-- Statistics Tab -->
      @if (activeTab() === 'statistics') {
        <div class="max-w-5xl mx-auto">
          <app-calibration-statistics
            [statistics]="statistics()"
            [historyRecords]="historyRecords()"
            (filterByRun)="onFilterByRunId($event)"
          />
        </div>
      }
    }
  </div>

  <!-- Detail Side Panel (overlay) -->
  @if (selectedRecord()) {
    <div class="fixed inset-0 z-40 flex">
      <!-- Backdrop -->
      <div
        class="flex-1 bg-black/30 cursor-pointer"
        (click)="onCloseDetail()"
        aria-label="Close detail panel"
      ></div>
      <!-- Panel -->
      <div class="w-full max-w-2xl bg-white border-l border-neutral-200 shadow-2xl overflow-y-auto p-6">
        <app-calibration-history-detail
          [record]="selectedRecord()!"
          [isRollingBack]="isRollingBack()"
          (rollback)="onRollback(selectedRecord()!.source_sensor_id ?? selectedRecord()!.sensor_id, $event)"
          (viewRun)="onViewRun($event)"
          (close)="onCloseDetail()"
        />
      </div>
    </div>
  }
</div>
