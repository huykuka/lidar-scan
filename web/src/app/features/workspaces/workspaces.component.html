<div class="flex flex-col flex-1 h-full w-full min-h-0 animate-in fade-in duration-500">
  @if (isNarrowScreen() && !isSinglePane()) {
    <!-- Responsive guard: <1024px in multi-pane mode -->
    <div class="flex flex-col items-center justify-center flex-1 text-center p-8">
      <syn-icon name="desktop_windows" class="text-4xl text-syn-color-neutral-400 mb-4" />
      <p class="text-syn-color-neutral-600 font-semibold">
        Split-view requires desktop screen (min. 1024px width)
      </p>
    </div>
  } @else {
    <!-- Main split-pane area + settings panel -->
    <div class="workspace-layout flex-1 min-h-0">
      <div class="flex-1 relative overflow-hidden rounded-xs min-h-0 min-w-0">
        <app-split-pane-container class="w-full h-full" />
        <!-- Layout switcher overlay — top-left of viewport (Foxglove/RViz pattern) -->
        <div class="absolute top-3 left-3 z-10 flex items-center bg-[var(--syn-panel-background-color)] border border-[var(--syn-panel-border-color)] rounded-[var(--syn-border-radius-medium)] p-0.5">
          <app-view-toolbar />
        </div>
      </div>

      <!-- Settings panel — toggle always visible, panel slides in/out -->
      <aside class="workspace-settings-panel shrink-0">
        <syn-tooltip
          [content]="settingsOpen() ? 'Collapse settings' : 'Expand settings'"
          [distance]="13"
          placement="left"
        >
          <button
            class="settings-toggle sm:hidden"
            (click)="settingsOpen.set(!settingsOpen())"
          >
            <syn-icon [name]="settingsOpen() ? 'chevron_right' : 'chevron_left'" class="settings-toggle__icon"></syn-icon>
          </button>
        </syn-tooltip>
        <div class="settings-content" [class.settings-content--collapsed]="!settingsOpen()">
          <app-workspace-controls class="block h-full" />
        </div>
      </aside>
    </div>
  }
</div>
