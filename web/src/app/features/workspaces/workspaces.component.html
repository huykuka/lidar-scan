<div class="flex flex-col flex-1 h-full w-full min-h-0 animate-in fade-in duration-500">
  <!-- Unified action bar: layout presets (left) + hide controls (right) -->
  <div class="flex items-center justify-between mb-2 shrink-0">
    <app-view-toolbar/>
    <syn-button
      (click)="toggleCockpit()"
      class="text-syn-color-primary-600"
      size="small"
      variant="text"
    >
      <syn-icon [name]="showCockpit() ? 'visibility_off' : 'settings'" slot="prefix"/>
      {{ showCockpit() ? 'Hide Settings' : 'Settings' }}
    </syn-button>
  </div>

  @if (isNarrowScreen() && !isSinglePane()) {
    <!-- Responsive guard: <1024px in multi-pane mode -->
    <div class="flex flex-col items-center justify-center flex-1 text-center p-8">
      <syn-icon name="desktop_windows" class="text-4xl text-syn-color-neutral-400 mb-4"/>
      <p class="text-syn-color-neutral-600 font-semibold">
        Split-view requires desktop screen (min. 1024px width)
      </p>
    </div>
  } @else {

    <!-- Main split-pane area + inline settings panel -->
    <div class="flex flex-row gap-4 flex-1 min-h-0">
      <div class="flex-1 relative overflow-hidden rounded-2xl min-h-0">
        <app-split-pane-container class="w-full h-full"/>

        <!-- HUD telemetry: only in single-pane mode -->
        @if (isSinglePane() && !isNarrowScreen()) {
          <app-workspace-telemetry/>
        }
      </div>

      <!-- Inline settings panel (replaces drawer) -->
      @if (showCockpit()) {
        <aside class="workspace-settings-panel shrink-0 overflow-y-auto animate-in slide-in-from-right duration-300">
          <app-workspace-controls class="block w-full"/>
        </aside>
      }
    </div>

  }

</div>
