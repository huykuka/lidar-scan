<!-- Viewport overlay: positioned absolutely over the Three.js canvas -->
<div class="absolute inset-0 pointer-events-none z-10">

  <!-- Top-left: orientation dropdown + reset button — always on top of empty-state -->
  <div class="absolute top-2 left-2 pointer-events-auto flex items-center gap-1 z-20">
    <syn-dropdown
      placement="bottom-start"
      [distance]="4"
      [open]="dropdownOpen()"
      (synAfterShowEvent)="dropdownOpen.set(true)"
      (synAfterHideEvent)="dropdownOpen.set(false)"
    >
      <!-- Trigger button -->
      <button
        slot="trigger"
        class="orient-trigger"
        [title]="currentOption().label"
      >
        <span class="orient-svg" [innerHTML]="currentOption().svg"></span>
      </button>

      <!-- Menu items -->
      <div class="orient-menu">
        @for (opt of orientationOptions; track opt.value) {
          <button
            class="orient-item"
            [class.orient-item--active]="opt.value === pane().orientation"
            (click)="setOrientation(opt.value)"
          >
            <span class="orient-svg orient-svg--sm" [innerHTML]="opt.svg"></span>
            <span class="orient-item-label">{{ opt.label }}</span>
          </button>
        }
      </div>
    </syn-dropdown>

    <!-- Reset camera to center -->
    <button
      class="orient-trigger"
      title="Reset view to center"
      (click)="resetCamera()"
    >
      <syn-icon name="center_focus_strong" style="font-size:16px;color:#fff;display:flex;"></syn-icon>
    </button>
  </div>

  <!-- Empty state overlay: shown when no point cloud data is loaded -->
  @if (!hasData()) {
    <div
      class="absolute inset-0 flex flex-col items-center justify-center
             bg-black/20 backdrop-blur-[1px] pointer-events-none"
    >
      <span
        class="text-2xl font-black uppercase tracking-widest
               text-white/30 select-none"
      >{{ pane().orientation }} VIEW</span>
      <span class="text-xs text-white/20 mt-1 select-none">No point cloud loaded</span>
    </div>
  }

</div>
