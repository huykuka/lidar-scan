@if (isGridLayout()) {
  <!-- ── 4-pane 2×2 CSS grid layout ─────────────────────────────────────── -->
  <div class="grid grid-cols-2 grid-rows-2 w-full h-full gap-2 layout-enter">
    @for (pane of allPanes(); track pane.id) {
      <div
        class="relative min-w-0 min-h-0 overflow-hidden rounded-xl"
        [attr.data-pane-id]="pane.id"
      >
        <app-point-cloud
          class="w-full h-full block"
          [backgroundColor]="store.backgroundColor()"
          [pointSize]="store.pointSize()"
          [showAxes]="store.showAxes()"
          [showGrid]="store.showGrid()"
          [viewType]="pane.orientation"
          [viewId]="pane.id"
        ></app-point-cloud>

        <app-viewport-overlay [pane]="pane"></app-viewport-overlay>
      </div>
    }
  </div>
} @else {
  <!-- ── Flex split layout (single / h-split / v-split) ─────────────────── -->
  @for (group of groups(); track groupKey(group, $index)) {
    <div [class]="groupClass(group) + ' layout-enter gap-2'">

      @for (pane of group.panes; track pane.id; let last = $last) {

        <div
          class="relative min-w-50 min-h-50 overflow-hidden rounded-xl transition-all duration-250 ease-in-out"
          [style]="paneStyle(pane)"
          [attr.data-pane-id]="pane.id"
        >
          <app-point-cloud
            class="w-full h-full block"
            [backgroundColor]="store.backgroundColor()"
            [pointSize]="store.pointSize()"
            [showAxes]="store.showAxes()"
            [showGrid]="store.showGrid()"
            [viewType]="pane.orientation"
            [viewId]="pane.id"
          ></app-point-cloud>

          <app-viewport-overlay [pane]="pane"></app-viewport-overlay>
        </div>

      }
    </div>
  }
}
