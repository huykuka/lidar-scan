<div class="overflow-x-auto rounded border border-syn-color-neutral-200">
  <table class="w-full text-sm">
    <thead class="bg-syn-color-neutral-100">
      <tr>
        <th class="px-3 py-2 text-left font-semibold text-syn-color-neutral-700 w-1/3">Key</th>
        <th class="px-3 py-2 text-left font-semibold text-syn-color-neutral-700">Value</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.key) {
        <tr class="border-t border-syn-color-neutral-100 hover:bg-syn-color-neutral-50">
          <td class="px-3 py-2 font-mono text-syn-color-neutral-600 align-top">{{ row.key }}</td>
          <td class="px-3 py-2 text-syn-typography-color-text align-top">
            @if (row.isComplex) {
              <button
                (click)="toggleExpand(row.key)"
                class="text-xs text-syn-color-primary-600 underline mr-2"
                type="button"
              >
                {{ isExpanded(row.key) ? 'Collapse' : 'Expand' }}
              </button>
              @if (isExpanded(row.key)) {
                <pre class="mt-1 text-xs whitespace-pre-wrap break-all text-syn-color-neutral-700">{{ row.displayValue }}</pre>
              } @else {
                <span class="font-mono text-xs text-syn-color-neutral-500 truncate block max-w-xs">
                  {{ row.displayValue }}
                </span>
              }
            } @else {
              <span class="font-mono">{{ row.displayValue }}</span>
            }
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="2" class="px-3 py-4 text-center text-syn-color-neutral-500 italic">
            No metadata available
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
