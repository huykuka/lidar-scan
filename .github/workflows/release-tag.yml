name: Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version-sync:
    name: Sync FE/BE Version To Main
    runs-on: cicd
    steps:
      - name: Checkout main for version sync
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Commit FE and BE versions from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          sed -i -E "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" web/package.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml web/package.json

          if git diff --cached --quiet; then
            echo "Versions already synced to ${VERSION}."
          else
            git commit -m "chore: release version ${VERSION} [skip ci]"
            git push origin HEAD:main
          fi

  frontend:
    name: Frontend Pipeline
    needs: [version-sync]
    uses: ./.github/workflows/frontend.yml
    with:
      frontend_changed: false
      checkout_ref: main
    secrets: inherit

  backend-cpp:
    name: Backend Cpp Pipeline
    needs: [version-sync]
    uses: ./.github/workflows/backend-cpp.yml
    with:
      cpp_changed: false
      checkout_ref: main
    secrets: inherit

  docker:
    name: Build & Push Docker Image (Tag)
    runs-on: cicd
    needs: [version-sync, frontend, backend-cpp]
    if: |
      needs.version-sync.result == 'success' &&
      needs.frontend.result == 'success' &&
      needs.backend-cpp.result == 'success'
    steps:
      - name: Checkout synced main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-ci-artifacts
          path: ci-artifacts

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts/frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:latest
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache,mode=max

  release:
    name: Create GitHub Release
    runs-on: cicd
    needs: [docker]
    if: needs.docker.result == 'success'
    steps:
      - name: Create release from tag (if missing)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
