name: Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    name: Frontend Pipeline
    uses: ./.github/workflows/frontend.yml
    with:
      frontend_changed: true
    secrets: inherit

  backend-cpp:
    name: Backend Cpp Pipeline
    uses: ./.github/workflows/backend-cpp.yml
    with:
      cpp_changed: true
    secrets: inherit

  docker:
    name: Build & Push Docker Image (Tag)
    runs-on: ubuntu-latest
    needs: [frontend, backend-cpp]
    if: |
      needs.frontend.result == 'success' &&
      needs.backend-cpp.result == 'success'
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-ci-artifacts
          path: ci-artifacts

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts/frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: needs.docker.result == 'success'
    steps:
      - name: Create release from tag (if missing)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
