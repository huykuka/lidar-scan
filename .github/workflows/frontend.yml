name: Frontend Pipeline

on:
  workflow_call:
    inputs:
      frontend_changed:
        required: true
        type: boolean
      checkout_ref:
        required: false
        type: string
        default: ''

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Checkout event ref
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v6

      - name: Restore frontend cache
        id: fe-cache
        uses: actions/cache/restore@v6
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/package.json', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore pnpm dependencies
        id: pnpm-deps
        uses: actions/cache/restore@v6
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Install dependencies
        working-directory: web
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Save pnpm dependencies
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Run frontend tests
        if: inputs.frontend_changed
        working-directory: web
        run: npm run test
        env:
          CI: true

      - name: Build production
        if: inputs.frontend_changed || steps.fe-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: pnpm run build --configuration production
        env:
          CI: true

      - name: Save frontend cache
        if: inputs.frontend_changed || steps.fe-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/package.json', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Stage frontend artifacts
        run: |
          mkdir -p ci-artifacts/frontend
          cp -a web/dist/web/browser/. ci-artifacts/frontend/

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts/frontend/
          retention-days: 1
