name: opencode-merge

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  merge:
    # Trigger if it's a PR comment or review
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review') ||
      (github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode Auto-Merge
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4o
          prompt: |
            Analyze the following content: "${{ github.event.comment.body || github.event.review.body }}"
            If the content semantically means "it looks good", "approved", or "LGTM", then:
            1. Merge the Pull Request.
            2. Comment on the PR that it has been merged.
            If the content is NOT an approval, simply stop execution without taking any action.
