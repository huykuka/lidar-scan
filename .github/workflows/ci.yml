name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      cpp: ${{ steps.filter.outputs.cpp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/**'
            backend:
              - 'app/**'
              - 'main.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/Dockerfile'
            cpp:
              - 'docker/Dockerfile.ci'
              - 'setup/Dockerfile'

  frontend-test:
    name: Frontend Tests
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore pnpm dependencies
        id: pnpm-deps
        uses: actions/cache/restore@v4
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Install dependencies
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: web
        run: npm run test
        env:
          CI: true

  version-bump:
    name: Bump Semver
    runs-on: ubuntu-latest
    needs: [changes, frontend-test]
    if: |
      needs.changes.result == 'success' &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      fe_version: ${{ steps.bump.outputs.fe_version }}
      be_version: ${{ steps.bump.outputs.be_version }}
      frontend_changed: ${{ steps.bump.outputs.frontend_changed }}
      backend_changed: ${{ steps.bump.outputs.backend_changed }}
      checkout_ref: ${{ steps.resolve-ref.outputs.checkout_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump semver
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
        run: |
          bump_version() {
            local current="$1"
            local message="$2"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$current"

            # Major bumps are manual via git tags (GitFlow release tags).
            # Pipeline auto-bumps only minor/patch.
            if [[ "$message" == *"#minor"* ]] || [[ "$message" =~ ^feat(\(.+\))?: ]]; then
              echo "${MAJOR}.$((MINOR + 1)).0"
            else
              echo "${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          }

          FE_CURRENT=$(grep -m1 '"version"' web/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          BE_CURRENT=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          FE_NEW="$FE_CURRENT"
          BE_NEW="$BE_CURRENT"

          # A version-bump commit may trigger a workflow run without the
          # platform's [skip ci] handling. Keep this job successful but do not
          # increment the version a second time.
          if [[ "$COMMIT_MESSAGE" =~ ^chore:\ bump\ versions? ]]; then
            echo "new_version=${BE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "fe_version=${FE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "be_version=${BE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=false
          FE_BUMPED=false
          BE_BUMPED=false

          if [[ "$FRONTEND_CHANGED" == "true" ]]; then
            FE_NEW="$(bump_version "$FE_CURRENT" "$COMMIT_MESSAGE")"
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${FE_NEW}\"/" web/package.json
            CHANGED=true
            FE_BUMPED=true
          fi

          if [[ "$BACKEND_CHANGED" == "true" ]]; then
            BE_NEW="$(bump_version "$BE_CURRENT" "$COMMIT_MESSAGE")"
            sed -i "s/^version = \"${BE_CURRENT}\"/version = \"${BE_NEW}\"/" pyproject.toml
            CHANGED=true
            BE_BUMPED=true
          fi

          echo "new_version=${BE_NEW}" >> "$GITHUB_OUTPUT"
          echo "fe_version=${FE_NEW}" >> "$GITHUB_OUTPUT"
          echo "be_version=${BE_NEW}" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=${FE_BUMPED}" >> "$GITHUB_OUTPUT"
          echo "backend_changed=${BE_BUMPED}" >> "$GITHUB_OUTPUT"
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/package.json pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump versions fe=${{ steps.bump.outputs.fe_version }} be=${{ steps.bump.outputs.be_version }} [skip ci]"
          git push origin HEAD:main

      - name: Resolve checkout ref
        id: resolve-ref
        run: echo "checkout_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend Pipeline
    needs: [changes, version-bump]
    if: needs.version-bump.result == 'success'
    uses: ./.github/workflows/frontend.yml
    with:
      frontend_changed: ${{ needs.version-bump.outputs.frontend_changed == 'true' }}
      checkout_ref: ${{ needs.version-bump.outputs.checkout_ref }}
    secrets: inherit

  backend-cpp:
    name: Backend Cpp Pipeline
    needs: [changes, version-bump]
    if: needs.version-bump.result == 'success'
    uses: ./.github/workflows/backend-cpp.yml
    with:
      cpp_changed: ${{ needs.changes.outputs.cpp == 'true' }}
      checkout_ref: ${{ needs.version-bump.outputs.checkout_ref }}
    secrets: inherit

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [version-bump, backend-cpp, frontend]
    if: |
      needs.version-bump.result == 'success' &&
      needs.backend-cpp.result == 'success' &&
      needs.frontend.result == 'success'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.checkout_ref }}

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-ci-artifacts
          path: ci-artifacts

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts/frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version-bump.outputs.be_version }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.version-bump.outputs.be_version }}
            io.lidarstudio.backend.version=${{ needs.version-bump.outputs.be_version }}
            io.lidarstudio.frontend.version=${{ needs.version-bump.outputs.fe_version }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache,mode=max

  release-auto:
    name: Create GitHub Release (Auto)
    runs-on: ubuntu-latest
    needs: [version-bump, docker]
    if: |
      needs.docker.result == 'success' &&
      needs.version-bump.outputs.backend_changed == 'true'
    steps:
      - name: Create release from backend version (if missing)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BE_VERSION: ${{ needs.version-bump.outputs.be_version }}
          FE_VERSION: ${{ needs.version-bump.outputs.fe_version }}
          CHECKOUT_REF: ${{ needs.version-bump.outputs.checkout_ref }}
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio
        run: |
          TAG="v${BE_VERSION}"
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --target "$CHECKOUT_REF" \
            --title "$TAG" \
            --notes "$(printf 'Backend: %s\nFrontend: %s\nImage: %s:%s\nAlso pushed: %s:latest' "$BE_VERSION" "$FE_VERSION" "$IMAGE_NAME" "$BE_VERSION" "$IMAGE_NAME")"

