name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      cpp: ${{ steps.filter.outputs.cpp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/**'
            backend:
              - 'app/**'
              - 'main.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/Dockerfile'
            cpp:
              - 'docker/Dockerfile.ci'
              - 'setup/Dockerfile'

  version-bump:
    name: Bump Semver
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      fe_version: ${{ steps.bump.outputs.fe_version }}
      be_version: ${{ steps.bump.outputs.be_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
        run: |
          FE_CURRENT=$(grep -m1 '"version"' web/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          BE_CURRENT=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          FE_NEW="$FE_CURRENT"
          BE_NEW="$BE_CURRENT"

          # A version-bump commit may trigger a workflow run without the
          # platform's [skip ci] handling. Keep this job successful but do not
          # increment the version a second time.
          if [[ "$COMMIT_MESSAGE" == chore:\ bump\ version* ]]; then
            echo "new_version=${BE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "fe_version=${FE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "be_version=${BE_CURRENT}" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=false

          if [[ "$FRONTEND_CHANGED" == "true" ]]; then
            IFS='.' read -r FE_MAJOR FE_MINOR FE_PATCH <<< "$FE_CURRENT"
            FE_NEW="${FE_MAJOR}.${FE_MINOR}.$((FE_PATCH + 1))"
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${FE_NEW}\"/" web/package.json
            CHANGED=true
          fi

          if [[ "$BACKEND_CHANGED" == "true" ]]; then
            IFS='.' read -r BE_MAJOR BE_MINOR BE_PATCH <<< "$BE_CURRENT"
            BE_NEW="${BE_MAJOR}.${BE_MINOR}.$((BE_PATCH + 1))"
            sed -i "s/^version = \"${BE_CURRENT}\"/version = \"${BE_NEW}\"/" pyproject.toml
            CHANGED=true
          fi

          echo "new_version=${BE_NEW}" >> "$GITHUB_OUTPUT"
          echo "fe_version=${FE_NEW}" >> "$GITHUB_OUTPUT"
          echo "be_version=${BE_NEW}" >> "$GITHUB_OUTPUT"
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/package.json pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump versions fe=${{ steps.bump.outputs.fe_version }} be=${{ steps.bump.outputs.be_version }} [skip ci]"
          git push origin HEAD:main

  check-cpp-cache:
    name: Check C++ Cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Restore C++ cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: cpp-staging
          key: sick-scan-xd-3.9.0-ubuntu2204-v2-${{ runner.os }}

  build-cpp:
    name: Build C++ sick_scan_xd
    runs-on: ubuntu-latest
    needs: [version-bump, check-cpp-cache, changes]
    if: |
      needs.check-cpp-cache.outputs.cache-hit != 'true' ||
      needs.changes.outputs.cpp == 'true'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build sick_scan_xd Docker image
        run: docker build -f setup/Dockerfile -t cpp-builder .

      - name: Stage C++ artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/cpp-staging/build" "$GITHUB_WORKSPACE/cpp-staging/launch"
          docker create --name cpp-builder cpp-builder
          docker cp cpp-builder:/workspace/build/. "$GITHUB_WORKSPACE/cpp-staging/build/"
          docker cp cpp-builder:/workspace/sick_scan_xd/launch/. "$GITHUB_WORKSPACE/cpp-staging/launch/"
          docker rm cpp-builder

      - name: Save C++ cache
        uses: actions/cache/save@v4
        with:
          path: cpp-staging
          key: sick-scan-xd-3.9.0-ubuntu2204-v2-${{ runner.os }}

      - name: Upload C++ artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-artifacts
          path: cpp-staging/
          retention-days: 1

  check-frontend-cache:
    name: Check Frontend Cache
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore frontend cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: [changes, version-bump, check-frontend-cache]
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.check-frontend-cache.outputs.cache-hit != 'true'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore frontend cache
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore pnpm dependencies
        id: pnpm-deps
        uses: actions/cache/restore@v4
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Install dependencies
        working-directory: web
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Save pnpm dependencies
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Build production
        working-directory: web
        run: pnpm run build --configuration production
        env:
          CI: true

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/web/browser/
          retention-days: 1

      - name: Save frontend cache
        uses: actions/cache/save@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

  prepare-backend-artifacts:
    name: Prepare Backend Artifacts
    runs-on: ubuntu-latest
    needs: [changes, version-bump, build-cpp]
    if: |
      always() &&
      needs.version-bump.result == 'success' &&
      (needs.build-cpp.result == 'success' || needs.build-cpp.result == 'skipped')
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore C++ build cache
        if: needs.build-cpp.result == 'skipped'
        uses: actions/cache/restore@v4
        with:
          path: cpp-staging
          key: sick-scan-xd-3.9.0-ubuntu2204-v2-${{ runner.os }}

      - name: Download C++ artifacts
        if: needs.build-cpp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cpp-artifacts
          path: cpp-staging

      - name: Stage backend artifacts
        run: |
          mkdir -p ci-artifacts/build ci-artifacts/launch
          cp cpp-staging/build/libsick_scan_xd_shared_lib.so ci-artifacts/build/
          cp cpp-staging/build/sick_generic_caller ci-artifacts/build/
          cp -a cpp-staging/launch/. ci-artifacts/launch/
          sed -E 's/^version = ".*"/version = "0.0.0"/' pyproject.toml > ci-artifacts/pyproject-deps.toml

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-artifacts
          path: |
            ci-artifacts/build/
            ci-artifacts/launch/
            ci-artifacts/pyproject-deps.toml
          retention-days: 1

  prepare-frontend-artifacts:
    name: Prepare Frontend Artifacts
    runs-on: ubuntu-latest
    needs: [changes, version-bump, build-frontend]
    if: |
      always() &&
      needs.version-bump.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore frontend build cache
        if: needs.build-frontend.result == 'skipped'
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Download frontend artifacts
        if: needs.build-frontend.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/web/browser

      - name: Stage frontend artifacts
        run: |
          mkdir -p ci-artifacts/frontend
          cp -a web/dist/web/browser/. ci-artifacts/frontend/

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts/frontend/
          retention-days: 1

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [changes, version-bump, prepare-backend-artifacts, prepare-frontend-artifacts]
    if: |
      always() &&
      needs.version-bump.result == 'success' &&
      needs.prepare-backend-artifacts.result == 'success' &&
      needs.prepare-frontend-artifacts.result == 'success'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-ci-artifacts
          path: ci-artifacts

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-ci-artifacts
          path: ci-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version
        id: ver
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio
          tags: |
            type=raw,value=latest-amd64
            type=raw,value=${{ steps.ver.outputs.version }}-amd64
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache,mode=max
