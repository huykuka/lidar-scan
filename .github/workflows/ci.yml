name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/**'
            backend:
              - 'app/**'
              - 'main.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/Dockerfile'

  version-bump:
    name: Bump Semver
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CURRENT=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          # A version-bump commit may trigger a workflow run without the
          # platform's [skip ci] handling. Keep this job successful but do not
          # increment the version a second time.
          if [[ "$COMMIT_MESSAGE" == chore:\ bump\ version* ]]; then
            echo "new_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW_VERSION}\"/" web/package.json
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push version
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml web/package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

  check-cpp-cache:
    name: Check C++ Cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Restore C++ cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /tmp/cpp-build
            /tmp/sick_scan_xd
          key: sick-scan-xd-3.9.0-ubuntu2204-${{ runner.os }}

  build-cpp:
    name: Build C++ sick_scan_xd
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    needs: [version-bump, check-cpp-cache]
    if: needs.check-cpp-cache.outputs.cache-hit != 'true'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore C++ cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/cpp-build
            /tmp/sick_scan_xd
          key: sick-scan-xd-3.9.0-ubuntu2204-${{ runner.os }}

      - name: Build sick_scan_xd
        run: |
          apt-get update
          apt-get install -y build-essential cmake ninja-build git
          git clone -b 3.9.0 https://github.com/SICKAG/sick_scan_xd.git /tmp/sick_scan_xd
          mkdir -p /tmp/cpp-build
          cd /tmp/cpp-build
          cmake -DROS_VERSION=0 -DLDMRS=0 -G "Unix Makefiles" /tmp/sick_scan_xd
          make -j"$(nproc)"

      - name: Save C++ cache
        uses: actions/cache/save@v4
        with:
          path: |
            /tmp/cpp-build
            /tmp/sick_scan_xd
          key: sick-scan-xd-3.9.0-ubuntu2204-${{ runner.os }}

      - name: Upload C++ artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-artifacts
          path: |
            /tmp/cpp-build/libsick_scan_xd_shared_lib.so
            /tmp/cpp-build/sick_generic_caller
            /tmp/sick_scan_xd/launch/
          retention-days: 1

  check-frontend-cache:
    name: Check Frontend Cache
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore frontend cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: [changes, version-bump, check-frontend-cache]
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.check-frontend-cache.outputs.cache-hit != 'true'
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore frontend cache
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore pnpm dependencies
        id: pnpm-deps
        uses: actions/cache/restore@v4
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/package.json', 'web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Install dependencies
        working-directory: web
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Save pnpm dependencies
        if: steps.pnpm-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: web/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('web/package.json', 'web/pnpm-lock.yaml', 'web/pnpm-workspace.yaml') }}

      - name: Build production
        working-directory: web
        run: pnpm run build --configuration production
        env:
          CI: true

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/web/browser/
          retention-days: 1

      - name: Save frontend cache
        uses: actions/cache/save@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [changes, version-bump, build-cpp, build-frontend]
    if: |
      always() &&
      needs.version-bump.result == 'success' &&
      (needs.build-cpp.result == 'success' || needs.build-cpp.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - name: Checkout versioned source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore C++ build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /tmp/cpp-build
            /tmp/sick_scan_xd
          key: sick-scan-xd-3.9.0-ubuntu2204-${{ runner.os }}

      - name: Restore frontend build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            web/dist/web/browser
          key: frontend-build-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/src/**', 'web/angular.json', 'web/tsconfig*.json', 'web/*.config.*') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version
        id: ver
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio
          tags: |
            type=raw,value=latest-amd64
            type=raw,value=${{ steps.ver.outputs.version }}-amd64
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lidar-studio:buildcache,mode=max
